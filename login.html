<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متابع الورد اليومي - تسجيل الدخول</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    <div class="glass-card login-card">
      <div class="logo-area">
        <i class="fas fa-book-quran logo-icon"></i>
        <h1 class="site-title">متابع الورد اليومي</h1>
        <p class="subtitle">حافظ على تلاوتك اليومية</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required />
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="loginPassword" placeholder="كلمة المرور" required />
        </div>
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" /> تذكرني
          </label>
          <a href="#" id="forgotPassword" class="forgot-link">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="btn-primary login-btn">
          <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
        <div class="auth-actions">
          <button type="button" id="createAccountBtn" class="btn-outline">
            <i class="fas fa-user-plus"></i> إنشاء حساب
          </button>
          <button type="button" id="guestLoginBtn" class="btn-ghost">
            <i class="fas fa-user-secret"></i> دخول كضيف
          </button>
        </div>
        <div class="dev-mode">
          <a href="#" id="devModeLink" class="dev-link">دخول كمستخدم تجريبي (Developer Mode)</a>
        </div>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
