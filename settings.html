<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإعدادات - متابع الورد اليومي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar glass">
    <div class="nav-brand">
      <i class="fas fa-book-quran"></i>
      <span>متابع الورد</span>
    </div>
    <ul class="nav-menu">
      <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
      <li><a href="tracker.html"><i class="fas fa-chart-line"></i> المتابعة</a></li>
      <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> الإعدادات</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</a></li>
    </ul>
    <div class="nav-toggle" id="navToggle">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <main class="main-content">
    <h2 class="page-title"><i class="fas fa-sliders-h"></i> الإعدادات</h2>
    
    <div class="settings-grid">
      <div class="setting-card glass">
        <h3><i class="fas fa-user-edit"></i> تغيير الاسم</h3>
        <div class="setting-group">
          <input type="text" id="settingsName" placeholder="اسم المستخدم" />
          <button id="saveNameBtn" class="btn-primary">حفظ</button>
        </div>
      </div>

      <div class="setting-card glass">
        <h3><i class="fas fa-bullseye"></i> الهدف اليومي</h3>
        <div class="setting-group">
          <input type="number" id="settingsGoal" placeholder="عدد الأجزاء" min="1" max="30" />
          <button id="saveGoalBtn" class="btn-primary">حفظ</button>
        </div>
      </div>

      <div class="setting-card glass">
        <h3><i class="fas fa-palette"></i> لون الموقع</h3>
        <div class="color-options">
          <button class="color-btn" data-color="#2e7d32" style="background:#2e7d32"></button>
          <button class="color-btn" data-color="#1a237e" style="background:#1a237e"></button>
          <button class="color-btn" data-color="#b71c1c" style="background:#b71c1c"></button>
          <button class="color-btn" data-color="#e65100" style="background:#e65100"></button>
          <button class="color-btn" data-color="#4a148c" style="background:#4a148c"></button>
        </div>
      </div>

      <div class="setting-card glass">
        <h3><i class="fas fa-moon"></i> الوضع الليلي</h3>
        <div class="setting-group">
          <label class="toggle-switch">
            <input type="checkbox" id="darkModeToggle" />
            <span class="toggle-slider"></span>
          </label>
          <span id="darkModeStatus">معطل</span>
        </div>
      </div>

      <div class="setting-card glass danger">
        <h3><i class="fas fa-trash-alt"></i> حذف جميع البيانات</h3>
        <button id="deleteAllBtn" class="btn-danger">
          <i class="fas fa-exclamation-triangle"></i> حذف الكل
        </button>
      </div>

      <div class="setting-card glass">
        <h3><i class="fas fa-info-circle"></i> معلومات الموقع</h3>
        <p>متابع الورد اليومي v1.0</p>
        <p>تطبيق لتتبع تلاوة القرآن اليومية</p>
        <p>© 2026 جميع الحقوق محفوظة</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 متابع الورد اليومي - جميع الحقوق محفوظة</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
